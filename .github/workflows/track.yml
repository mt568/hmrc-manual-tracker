name: track
on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC — captures previous UK business day
  workflow_dispatch:
    inputs:
      seed_manual:
        description: "Manual slug to seed (one-off onboarding); empty = daily run"
        required: false
        default: ""

permissions:
  contents: write

concurrency: track   # never two crawls at once

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      TRACKER_CONTACT: ${{ github.server_url }}/${{ github.repository }}/issues
    steps:
      # Pin third-party actions to reviewed commits.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: test
        run: python -m pytest -q
      - name: scrape
        run: |
          if [ -n "${{ github.event.inputs.seed_manual }}" ]; then
            python scripts/scrape.py seed "${{ github.event.inputs.seed_manual }}"
          else
            python scripts/scrape.py daily
          fi
      - name: commit
        run: |
          git config user.name "hmrc-manual-tracker"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "crawl $(date -u +%F)"
          git push
      # Phase 2 adds: build_site.py + actions/deploy-pages here
      - name: health check   # red run (and email) if any manual failed — after commit
        run: python scripts/scrape.py health

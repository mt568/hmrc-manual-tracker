name: track
on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC — captures previous UK business day
  workflow_dispatch:
    inputs:
      seed_manual:
        description: "Manual slug to seed (one-off onboarding); empty = daily run"
        required: false
        default: ""

permissions:
  contents: write

concurrency: track   # never two crawls at once

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4      # default depth: site builds from ledgers, not git history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: scrape
        run: |
          if [ -n "${{ github.event.inputs.seed_manual }}" ]; then
            python scripts/scrape.py seed "${{ github.event.inputs.seed_manual }}"
          else
            python scripts/scrape.py daily
          fi
      - name: commit
        run: |
          git config user.name "hmrc-manual-tracker"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "crawl $(date -u +%F)"
          git push
      # Phase 2 adds: build_site.py + actions/deploy-pages here
      - name: health check   # red run (and email) if any manual failed — after commit
        run: python scripts/scrape.py health
